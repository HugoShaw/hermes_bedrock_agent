[project]
name = "hermes_bedrock_agent"
version = "0.1.0"
description = "Hermes Agent bridge for Amazon Bedrock Knowledge Bases"
requires-python = ">=3.11"
dependencies = [
  "boto3",
  "botocore",
  "python-dotenv",
  "typer",
  "rich",
  "httpx",
  "tenacity",
  "hermes-agent",
  "pypdf>=4.0",
  "python-docx>=1.1",
  "numpy>=1.26",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[project.scripts]
hermes_bedrock_agent = "hermes_bedrock_agent.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_bedrock_agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.uv.sources]
hermes-agent = { path = "../hermes-agent", editable = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
