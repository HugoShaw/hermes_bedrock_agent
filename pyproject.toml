[project]
name = "hermes-bedrock-agent"
version = "0.1.0"
description = "Hermes Agent bridge for Amazon Bedrock Knowledge Bases"
requires-python = ">=3.11"
dependencies = [
  "boto3",
  "botocore",
  "python-dotenv",
  "typer",
  "rich",
  "httpx",
  "tenacity",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[project.scripts]
hermes-bedrock-agent = "hermes_bedrock_agent.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_bedrock_agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
